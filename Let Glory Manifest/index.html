<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let Glory Manifest</title>
    <link rel="stylesheet" crossorigin href="assets/index-CHZslubi.css">
    <link rel="stylesheet" href="site-overrides.css?v=3">
    <style>
        @media (min-width: 769px) {
            #root section.min-h-screen > div.absolute.inset-0 {
                transform: translateY(14%) !important;
            }

            #root section.min-h-screen > div.absolute.inset-0 > img {
                object-position: center 82% !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" crossorigin src="assets/index-B9S4yvVQ.js"></script>

    <script>
        (function() {
            var logoPath = 'assets/tkm-copyright.svg';

            function removeMatchingText() {
                var badPattern = /Made with|for Micah & Damaris|Lovable|Loveable|lovable\.dev|lovable\.app|Timothy|Timithy|Kirathimo|httrack|ht track|trackevents|__l5e|_flock|mirror site|website mirror|Dev Assistant|AI Assistant|Powered by/i;

                document.querySelectorAll('footer, [role="contentinfo"]').forEach(function(node) {
                    if (badPattern.test(node.textContent || '')) {
                        node.remove();
                    }
                });

                document.querySelectorAll('button, a, [role="tab"], [data-value="ai"]').forEach(function(node) {
                    if (badPattern.test(node.textContent || '')) {
                        node.remove();
                    }
                });

                var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
                while (walker.nextNode()) {
                    var node = walker.currentNode;
                    if (!node.parentNode || /^(SCRIPT|STYLE)$/i.test(node.parentNode.tagName)) {
                        continue;
                    }
                    if (badPattern.test(node.textContent || '')) {
                        node.parentNode.removeChild(node);
                    }
                }
            }

            function ensureFooter() {
                var footer = document.querySelector('footer[data-site-footer="true"]');
                if (!footer) {
                    footer = document.createElement('footer');
                    footer.setAttribute('data-site-footer', 'true');
                    footer.style.cssText = 'text-align:center;padding:16px 12px 24px;font-size:0.9rem;color:#7c6b68;letter-spacing:0.08em;';
                    document.body.appendChild(footer);
                }

                footer.innerHTML = '<span>All rights reserved TKM</span><img class="tkm-copyright-logo" src="' + logoPath + '" alt="Copyright" /><span>2026</span>';
            }

            window.addEventListener('load', function() {
                setTimeout(function() {
                    removeMatchingText();
                    ensureFooter();
                }, 200);
            });
            window.addEventListener('DOMContentLoaded', function() {
                setTimeout(function() {
                    removeMatchingText();
                    ensureFooter();
                }, 200);
            });
            setTimeout(function() {
                removeMatchingText();
                ensureFooter();
            }, 1500);
        })();
    </script>

    <script>
        (function() {
            function normalizeUrl(url) {
                if (!url) return url;
                if (/^\/(?:assets|__l5e)\//i.test(url)) {
                    var path = window.location.pathname.replace(/\\/g, '/');
                    if (path.indexOf('/Let Glory Manifest/') !== -1 || path === '/Let Glory Manifest' || path.endsWith('/Let Glory Manifest')) {
                        return url.replace(/^\//, '');
                    }
                    return 'Let Glory Manifest' + url;
                }
                return url;
            }

            function rewriteAssetUrls() {
                document.querySelectorAll('[src],[href],[poster],[srcset]').forEach(function(node) {
                    if (node.hasAttribute('src')) {
                        var src = node.getAttribute('src');
                        if (/^\/(?:assets|__l5e)\//i.test(src)) {
                            node.setAttribute('src', normalizeUrl(src));
                        }
                    }
                    if (node.hasAttribute('href')) {
                        var href = node.getAttribute('href');
                        if (/^\/(?:assets|__l5e)\//i.test(href)) {
                            node.setAttribute('href', normalizeUrl(href));
                        }
                    }
                    if (node.hasAttribute('poster') && /^\/(?:assets|__l5e)\//i.test(node.getAttribute('poster'))) {
                        node.setAttribute('poster', normalizeUrl(node.getAttribute('poster')));
                    }
                    if (node.hasAttribute('srcset')) {
                        var srcset = node.getAttribute('srcset').replace(/(\/ (?:assets|__l5e)\/[^\s,]+)/gi, function(match) {
                            return normalizeUrl(match);
                        });
                        if (srcset !== node.getAttribute('srcset')) {
                            node.setAttribute('srcset', srcset);
                        }
                    }
                });
            }

            rewriteAssetUrls();

            var observer = new MutationObserver(function() {
                rewriteAssetUrls();
            });
            observer.observe(document.documentElement, {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: ['src', 'href', 'poster', 'srcset']
            });

            var lastSrc = null;

            function getImgSrc(img) {
                return img.currentSrc || img.src || '';
            }

            function applyMobileHeroStyles() {
                if (window.innerWidth > 768) return;

                var root = document.getElementById('root');
                if (!root) return;

                var hero = root.querySelector('.hero, .hero-image, .page-hero');
                if (!hero) return;

                var img = hero.querySelector('img');
                if (!img) return;

                var src = getImgSrc(img);
                if (lastSrc === src) return;
                lastSrc = src;

                hero.style.setProperty('height', '100vh', 'important');
                hero.style.setProperty('min-height', '100vh', 'important');
                hero.style.setProperty('max-height', '100vh', 'important');
                hero.style.setProperty('overflow', 'hidden', 'important');
                hero.style.setProperty('background', '#000', 'important');

                img.style.setProperty('width', '100%', 'important');
                img.style.setProperty('height', '100vh', 'important');
                img.style.setProperty('max-height', '100vh', 'important');
                img.style.setProperty('object-fit', 'contain', 'important');
                img.style.setProperty('object-position', 'center', 'important');
                img.style.setProperty('display', 'block', 'important');
                img.style.setProperty('margin', '0 auto', 'important');
            }

            function applyDesktopHeroStyles() {
                if (window.innerWidth <= 768) return;

                var root = document.getElementById('root');
                if (!root) return;

                var section = root.querySelector('section.min-h-screen');
                var layer = section && section.querySelector(':scope > div.absolute.inset-0');
                var img = layer && layer.querySelector('img');
                if (!layer || !img) return;

                layer.style.setProperty('transform', 'translateY(14%)', 'important');
                img.style.setProperty('object-position', 'center 82%', 'important');
            }

            function applyHeroStyles() {
                applyMobileHeroStyles();
                applyDesktopHeroStyles();
            }

            [100, 300, 600, 1000, 1500, 2000, 3000, 4000, 5000, 7000].forEach(function(delay) {
                setTimeout(applyHeroStyles, delay);
            });

            var observer2 = new MutationObserver(function() {
                applyHeroStyles();
            });
            observer2.observe(document.documentElement, {
                childList: true,
                subtree: true,
                attributes: true,
                characterData: true
            });

            window.addEventListener('resize', applyHeroStyles);
            window.addEventListener('load', applyHeroStyles);
        })();
    </script>
</body>
</html>
